<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { margin-top: 0; }
    p { color: #555; }
    .logout-btn {
      margin-top: 1rem;
      padding: 0.7rem 1.2rem;
      border: none;
      border-radius: 8px;
      background: #dc3545;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    .logout-btn:hover {
      background: #c82333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login successful!</h1>
    <p>You are now logged in.</p>
    <form action="/logout" method="POST">
      <button class="logout-btn" type="submit">Logout</button>
    </form>
  </div>
</body>
</html>
