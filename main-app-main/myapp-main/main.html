<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f4f7fb, #e9f0ff);
      margin: 0;
      padding: 2rem;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .header h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    .logout-btn {
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 8px;
      background: white;
      color: #2563eb;
      cursor: pointer;
      font-weight: bold;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
    }

    .panel {
      background: #f8fafc;
      border-radius: 12px;
      padding: 1.2rem;
    }

    .panel h2 {
      margin-top: 0;
      font-size: 1.1rem;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.4rem;
      margin-top: 0.8rem;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #dbe2ea;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .save-btn {
      margin-top: 1rem;
      padding: 0.8rem 1.1rem;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    .save-btn:hover {
      background: #1d4ed8;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .note-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .note-item {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.9rem;
    }

    .note-item h3 {
      margin: 0 0 0.3rem;
      font-size: 1rem;
    }

    .note-item p {
      margin: 0;
      color: #555;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .content {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Your Notes</h1>
      <form action="/logout" method="POST">
        <button class="logout-btn" type="submit">Logout</button>
      </form>
    </div>

    <div class="content">
      <div class="panel">
        <h2>Create a new note</h2>
        <form action="/notes" method="POST">
          <label for="title">Title</label>
          <input id="title" name="title" type="text" placeholder="Enter a title" />

          <label for="notes">Note</label>
          <textarea id="notes" name="notes" placeholder="Write your note here..."></textarea>

          <button class="save-btn" type="submit">Save note</button>
        </form>
      </div>

      <div class="panel">
        <h2>Your saved notes</h2>
        {{if .Message}}<p class="success">{{.Message}}</p>{{end}}

        <ul class="note-list">
          {{if .Notes}}
            {{range .Notes}}
              <li class="note-item">
                <h3>{{.Title}}</h3>
                <p>{{.Content}}</p>
              </li>
            {{end}}
          {{else}}
            <li class="note-item">
              <h3>No notes yet</h3>
              <p>Create your first note above.</p>
            </li>
          {{end}}
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
